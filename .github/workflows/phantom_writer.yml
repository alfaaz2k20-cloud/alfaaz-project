name: The Phantom Weekly Writer

# Runs every Sunday at 10:00 AM UTC
on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  wake_the_phantom:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render API
        run: |
          curl -X POST "https://alfaaz-project.onrender.com/admin/blogs/generate" \
               -H "Authorization: Bearer ${{ secrets.PHANTOM_TOKEN }}" \
               -H "Content-Type: application/json" \
               -d "{}" \
               --max-time 120
