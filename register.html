<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Access — ALFAAZ</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --grid-border: rgba(230, 238, 246, 0.1);
      --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      margin: 0;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background Setup */
    .bg-video {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: -2;
      filter: brightness(0.3) blur(4px);
    }
    .video-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 13, 23, 0.8); z-index: -1;
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 2rem; left: 2rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.3s ease;
    }
    .back-btn:hover { color: var(--accent-gold); }

    /* Login Card - Brutalist Window */
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border: 1px solid var(--grid-border);
      padding: 3rem 2.5rem;
      position: relative;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: var(--accent-gold);
    }

    .auth-title {
      font-family: 'Teko', sans-serif;
      font-size: 2.5rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .auth-subtitle {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 2.5rem;
      text-transform: uppercase;
    }

    .input-group { margin-bottom: 1.5rem; }

    .input-label {
      display: block;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .auth-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--grid-border);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 0.5rem 0;
      transition: border-color 0.3s ease;
    }

    .auth-input:focus {
      outline: none;
      border-bottom-color: var(--accent-gold);
    }

    .submit-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 1rem;
      background: var(--text-primary);
      color: var(--bg-primary);
      border: 1px solid var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s var(--transition-smooth);
    }

    .submit-btn:hover {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
    }

    .toggle-auth {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 9px;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    .toggle-auth a {
      color: var(--text-primary);
      text-decoration: underline;
      margin-left: 0.5rem;
      transition: color 0.3s ease;
    }
    .toggle-auth a:hover { color: var(--accent-gold); }
  </style>
</head>
<body>

  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://res.cloudinary.com/dmqwjpmjk/video/upload/v1761507594/portal-bg_oribvr.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <a href="index.html" class="back-btn">
    <i data-lucide="arrow-left" class="w-4 h-4"></i> Abort
  </a>

  <div class="auth-card">
    <h1 class="auth-title">Enlist</h1>
    <p class="auth-subtitle">Establish new credentials</p>

    <form id="registerForm">
      <div class="input-group">
        <label class="input-label" for="regEmail">Email Sequence</label>
        <input type="email" id="regEmail" class="auth-input" required autocomplete="email" spellcheck="false">
      </div>
      
      <div class="input-group">
        <label class="input-label" for="regPassword">Create Passkey</label>
        <input type="password" id="regPassword" class="auth-input" required>
      </div>

      <button type="submit" class="submit-btn">Request Clearance</button>
    </form>

    <div class="toggle-auth">
      Already in the collective? <a href="login.html">Initialize Session</a>
    </div>
  </div>

 <script>
    lucide.createIcons();

    const form = document.getElementById('registerForm');
    const submitBtn = document.querySelector('.submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const emailValue = document.getElementById('regEmail').value;
      const passwordValue = document.getElementById('regPassword').value;
      
      submitBtn.textContent = "Transmitting...";

      try {
        const response = await fetch('https://alfaaz-project.onrender.com/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailValue, password: passwordValue })
        });

        const data = await response.json();

        if (response.ok) {
          submitBtn.textContent = "Clearance Granted";
          submitBtn.style.background = "var(--accent-gold)";
          submitBtn.style.color = "var(--bg-primary)";
          
          // Save the new user data to the browser
          localStorage.setItem('alfaaz_user', JSON.stringify(data.user));
          
          // Teleport them straight to the dashboard
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);

        } else {
          submitBtn.textContent = "Request Clearance";
          alert("Registration Failed: " + data.detail);
        }

      } catch (error) {
        submitBtn.textContent = "Request Clearance";
        alert("Cannot reach the server. Is your Python engine running?");
      }
    });
  </script>
</body>
</html>
