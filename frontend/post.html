<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article | Alfaaz Collective</title>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <link rel="stylesheet" href="global.css">
  <script type="module" src="global.js"></script>
  <style>
    main { max-width: 800px; margin: 8rem auto 6rem; background: var(--bg-secondary); border: 1px solid var(--grid-border); box-shadow: var(--shadow-float); padding: 5rem 6rem; }
    @media (max-width: 768px) { main { padding: 3rem 2rem; margin-top: 6rem; } }
    .post-header { border-bottom: 1px solid var(--grid-border); padding-bottom: 2rem; margin-bottom: 3rem; text-align: center;}
    .post-meta { font-size: 10px; font-weight: 600; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1.5rem; display: block; }
    .post-title { font-family: var(--font-heading); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 400; color: var(--text-primary); line-height: 1.2; letter-spacing: 1px; }
    .post-content { font-size: 1.15rem; line-height: 1.9; color: var(--text-secondary); font-weight: 300; }
    .post-content h2 { font-family: var(--font-heading); font-size: 2rem; color: var(--text-primary); margin: 3rem 0 1rem; font-weight: 400; line-height: 1.3; }
    .post-content p { margin-bottom: 1.8rem; }
    .post-content blockquote { border-left: 2px solid var(--accent-gold); padding-left: 1.5rem; margin: 2.5rem 0; font-style: italic; color: var(--text-secondary); }
    
    /* Reference Section Styling */
    .post-content h3 { font-family: var(--font-heading); font-size: 1.8rem; color: var(--text-primary); margin: 3.5rem 0 1.2rem; border-top: 1px solid var(--grid-border); padding-top: 2rem; font-weight: 400; }
    .post-content ul { list-style: none; margin-bottom: 2rem; padding: 0; }
    .post-content ul li { font-size: 12px; color: var(--text-secondary); margin-bottom: 0.8rem; padding-left: 1.2rem; position: relative; line-height: 1.6; text-transform: none; letter-spacing: 0.5px; }
    .post-content ul li::before { content: "—"; position: absolute; left: 0; color: var(--accent-gold); }

    .loading-state { font-size: 11px; color: var(--text-secondary); text-align: center; padding: 4rem; text-transform: uppercase; letter-spacing: 2px; border: 1px dashed var(--grid-border); }
    footer { text-align: center; padding: 3em 0; border-top: 1px solid var(--grid-border); font-size: 10px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }
  </style>
</head>
<body>
  
  <nav id="navbar" style="justify-content: space-between;">
    <a href="index.html" class="logo">ALFAAZ</a>
    <div class="nav-actions">
      <a href="blogs.html" style="font-size: 11px; color: var(--text-secondary); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s ease;">Back to Journal</a>
    </div>
  </nav>

  <main id="articleTarget"><div class="loading-state">Loading essay...</div></main>

  <footer><p>Alfaaz Collective</p></footer>

  <script type="module">
    document.addEventListener('DOMContentLoaded', async () => {
        function sanitizeHTML(html) {
            const div = document.createElement('div'); 
            div.innerHTML = html;
            div.querySelectorAll('script, iframe, object, embed, form').forEach(el => el.remove());
            return div.innerHTML;
        }

        const target = document.getElementById('articleTarget');
        const articleId = new URLSearchParams(window.location.search).get('id');
        
        if (!articleId) { 
            target.innerHTML = '<div class="loading-state" style="color:var(--accent-red);">[Error] Document ID missing.</div>'; 
            return; 
        }
        
        try {
            const res = await window.globalApiFetch(`/blogs/${articleId}`);
            if (!res || !res.ok) throw new Error("Article not found.");
            
            const article = await res.json();
            const dateStr = new Date(article.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            target.innerHTML = `
                <div class="post-header">
                    <span class="post-meta">${dateStr} // Curator's Notes</span>
                    <h1 class="post-title">${article.title}</h1>
                </div>
                <div class="post-content">${sanitizeHTML(article.content)}</div>
            `;
            document.title = `${article.title} | Alfaaz Collective`;
            if (window.refreshGlobalEffects) window.refreshGlobalEffects();
        } catch (error) { 
            target.innerHTML = '<div class="loading-state" style="color:var(--accent-red);">[Error] Connection failed.</div>'; 
        }
    });
  </script>
</body>
</html>
