<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ALFAAZ</title>
  <script src="https://cdn.tailwindcss.com" defer></script>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <style>
    .auth-card { width: 100%; max-width: 420px; padding: 4rem 3rem; margin: 8rem auto; position: relative; }
    .auth-title { font-family: var(--font-heading); font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; font-weight: 400; }
    .auth-subtitle { font-family: var(--font-body); font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; text-align: center; margin-bottom: 3rem; text-transform: uppercase; }
    .input-group { margin-bottom: 2rem; }
    .auth-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--grid-border); color: var(--text-primary); font-family: var(--font-body); font-size: 14px; padding: 0.5rem 0; transition: border-color 0.3s ease; }
    .auth-input:focus { outline: none; border-bottom-color: var(--accent-gold); }
    .password-wrap { position: relative; }
    .password-wrap .auth-input { padding-right: 3rem; }
    .toggle-pw { position: absolute; right: 0; bottom: 0.5rem; background: none; border: none; color: var(--text-secondary); font-family: var(--font-body); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 0; transition: color 0.3s ease; }
    .toggle-pw:hover { color: var(--accent-gold); }
    .strength-bar-wrap { margin-top: 8px; height: 2px; background: var(--grid-border); }
    .strength-bar { height: 100%; width: 0%; transition: width 0.4s ease, background 0.4s ease; }
    .strength-label, .match-indicator { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; min-height: 12px; }
    #expiredOverlay { display: none; position: absolute; inset: 0; background: var(--bg-primary); z-index: 10; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 2rem; }
    #expiredOverlay.show { display: flex; }
  </style>
  <script type="module" crossorigin src="/assets/reset-Dw_6AUXg.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/components-DZ64e3xR.js">
  <link rel="stylesheet" crossorigin href="/assets/global-AdwKa-Dy.css">
</head>
<body>
  
  <alfaaz-nav></alfaaz-nav>

  <div class="auth-card panel">
    <div id="expiredOverlay">
      <div style="font-size: 2rem; margin-bottom: 1rem; color: var(--accent-red);">⊘</div>
      <p style="font-family:var(--font-heading); font-size: 2rem; color: var(--text-primary); margin-bottom: 0.5rem;">Link Expired</p>
      <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 2rem;">This reset link is no longer valid.<br>Please request a new one.</p>
      <a href="login.html" class="action-btn">Return to Login</a>
    </div>

    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Create a new secure password</p>

    <form id="resetForm">
      <div class="input-group">
        <label class="input-label" for="newPassword">New Password</label>
        <div class="password-wrap">
          <input type="password" id="newPassword" class="auth-input" required autocomplete="new-password">
          <button type="button" class="toggle-pw" id="toggleNew" tabindex="-1">show</button>
        </div>
        <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="input-group">
        <label class="input-label" for="confirmPassword">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword" class="auth-input" required autocomplete="new-password">
          <button type="button" class="toggle-pw" id="toggleConfirm" tabindex="-1">show</button>
        </div>
        <div class="match-indicator" id="matchIndicator"></div>
      </div>
      <button type="submit" class="submit-btn" style="width:100%;">Update Password</button>
    </form>
  </div>

</body>
</html>
