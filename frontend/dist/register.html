<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ALFAAZ</title>
  <script src="https://cdn.tailwindcss.com" defer></script>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  
  
  <style>
    .auth-card { width: 100%; max-width: 420px; padding: 4rem 3rem; margin: 8rem auto; position: relative; }
    .auth-title { font-family: var(--font-heading); font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; font-weight: 400; }
    .auth-subtitle { font-family: var(--font-body); font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; text-align: center; margin-bottom: 3rem; text-transform: uppercase; }
    .input-group { margin-bottom: 2rem; }
    .auth-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--grid-border); color: var(--text-primary); font-family: var(--font-body); font-size: 14px; padding: 0.5rem 0; transition: border-color 0.3s ease; }
    .auth-input:focus { outline: none; border-bottom-color: var(--accent-gold); }
    .password-wrap { position: relative; }
    .password-wrap .auth-input { padding-right: 3rem; }
    .strength-bar-wrap { margin-top: 8px; height: 2px; background: var(--grid-border); }
    .strength-bar { height: 100%; width: 0%; transition: width 0.4s ease, background 0.4s ease; }
    .strength-label, .match-indicator { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; min-height: 12px; }
    .toggle-auth { margin-top: 2rem; text-align: center; font-size: 11px; color: var(--text-secondary); }
    .toggle-auth a { color: var(--accent-gold); text-decoration: none; transition: color 0.3s ease; }
    .toggle-auth a:hover { color: var(--accent-green); }
  </style>
  <script type="module" crossorigin src="/assets/register-OzbqKpNr.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/global-BneSZJmH.js">
  <link rel="stylesheet" crossorigin href="/assets/global-AdwKa-Dy.css">
</head>
<body>
  
    <nav id="navbar" style="justify-content: space-between;">
    <a href="index.html" class="logo">ALFAAZ</a>
    <div class="nav-actions">
      <a href="index.html" class="" style="font-size: 11px; color: var(--text-secondary); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s ease;">Return</a>
    </div>
  </nav>

  <div class="auth-card panel">
    <h1 class="auth-title">Register</h1>
    <p class="auth-subtitle">Join the collective</p>
    <form id="registerForm">
      <div class="input-group">
        <label class="input-label" for="regName">Display Name <span style="color:var(--text-secondary); text-transform:lowercase;">(optional)</span></label>
        <input type="text" id="regName" class="auth-input" autocomplete="name" spellcheck="false" placeholder="e.g. Agha Shahid">
      </div>
      <div class="input-group">
        <label class="input-label" for="regEmail">Email Address</label>
        <input type="email" id="regEmail" class="auth-input" required autocomplete="email" spellcheck="false">
      </div>
      <div class="input-group">
        <label class="input-label" for="regPassword">Create Password</label>
        <input type="password" id="regPassword" class="auth-input" required autocomplete="new-password">
        <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="input-group">
        <label class="input-label" for="regConfirm">Confirm Password</label>
        <input type="password" id="regConfirm" class="auth-input" required autocomplete="new-password">
        <div class="match-indicator" id="matchIndicator"></div>
      </div>
      <button type="submit" class="submit-btn" style="width:100%;">Create Account</button>
    </form>
    <div class="toggle-auth">Already in the collective? <a href="login.html">Log In</a></div>
  </div>

</body>
</html>
