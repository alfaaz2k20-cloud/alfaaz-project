<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ALFAAZ Collective</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="global.css">
  <style>
    .auth-card { width: 100%; max-width: 420px; padding: 4rem 3rem; margin: 8rem auto; position: relative; }
    .auth-title { font-family: var(--font-heading); font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; font-weight: 400; }
    .auth-subtitle { font-family: var(--font-body); font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; text-align: center; margin-bottom: 3rem; text-transform: uppercase; }
    .input-group { margin-bottom: 2rem; }
    .auth-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--grid-border); color: var(--text-primary); font-family: var(--font-body); font-size: 14px; padding: 0.5rem 0; transition: border-color 0.3s ease; }
    .auth-input:focus { outline: none; border-bottom-color: var(--accent-gold); }
    .password-wrap { position: relative; }
    .password-wrap .auth-input { padding-right: 3rem; }
    .toggle-pw { position: absolute; right: 0; bottom: 0.5rem; background: none; border: none; color: var(--text-secondary); font-family: var(--font-body); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 0; transition: color 0.3s ease; }
    .toggle-pw:hover { color: var(--accent-gold); }
    .forgot-hint { font-size: 10px; color: var(--text-secondary); margin-top: 6px; opacity: 0; transform: translateY(-4px); transition: opacity 0.3s ease, transform 0.3s ease; }
    .forgot-hint.visible { opacity: 1; transform: translateY(0); }
    .recovery-link { display: block; text-align: right; font-size: 10px; color: var(--text-secondary); text-decoration: none; margin-top: 0.5rem; margin-bottom: 2rem; transition: color 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
    .recovery-link:hover { color: var(--accent-gold); }
    .toggle-auth { margin-top: 2rem; text-align: center; font-size: 11px; color: var(--text-secondary); }
    .toggle-auth a { color: var(--accent-gold); text-decoration: none; transition: color 0.3s ease; }
    .toggle-auth a:hover { color: var(--accent-green); }
    .back-btn { position: fixed; top: 2rem; left: 2rem; color: var(--text-secondary); text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem; transition: color 0.3s ease; z-index: 100; }
    .back-btn:hover { color: var(--accent-gold); }
  </style>
</head>
<body>
  <div class="custom-cursor" id="cursor"></div>
  <a href="index.html" class="back-btn magnetic"><i data-lucide="arrow-left" class="w-4 h-4"></i> Return</a>

  <div class="auth-card panel">
    <h1 class="auth-title">Login</h1>
    <p class="auth-subtitle">Access your account</p>
    <form id="authForm">
      <div class="input-group">
        <label class="input-label" for="email">Email Address</label>
        <input type="email" id="email" class="auth-input" required autocomplete="email" spellcheck="false">
      </div>
      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" class="auth-input" required autocomplete="current-password">
          <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">show</button>
        </div>
      </div>
      <a href="#" id="forgotBtn" class="recovery-link">Lost Password?</a>
      <div class="forgot-hint" id="forgotHint">↑ Enter your email above, then click "Lost Password?"</div>
      <button type="submit" class="submit-btn" style="width: 100%;">Log In</button>
    </form>
    <div class="toggle-auth">New to the collective? <a href="register.html">Register here</a></div>
  </div>

  <script src="global.js"></script>
  <script>
    const form = document.getElementById('authForm'), submitBtn = document.querySelector('.submit-btn'), forgotBtn = document.getElementById('forgotBtn'), emailInput = document.getElementById('email'), pwInput = document.getElementById('password'), togglePw = document.getElementById('togglePw'), forgotHint = document.getElementById('forgotHint');
    togglePw.addEventListener('click', () => { const hidden = pwInput.type === 'password'; pwInput.type = hidden ? 'text' : 'password'; togglePw.textContent = hidden ? 'hide' : 'show'; });
    forgotBtn.addEventListener('mouseenter', () => { if (!emailInput.value.trim()) forgotHint.classList.add('visible'); });
    forgotBtn.addEventListener('mouseleave', () => { forgotHint.classList.remove('visible'); });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const emailValue = emailInput.value.trim(), passwordValue = pwInput.value;
      submitBtn.textContent = "Authenticating..."; submitBtn.disabled = true;
      try {
        const response = await fetch('https://alfaaz-project.onrender.com/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: emailValue, password: passwordValue }) });
        const data = await response.json();
        if (response.ok) {
          submitBtn.textContent = "Welcome"; submitBtn.style.background = "var(--accent-gold)"; submitBtn.style.color = "#fff"; submitBtn.style.borderColor = "var(--accent-gold)";
          localStorage.setItem('alfaaz_user', JSON.stringify(data.user)); localStorage.setItem('alfaaz_token', data.token);
          setTimeout(() => { window.location.href = data.user.status === 'ADMIN' ? 'admin.html' : 'dashboard.html'; }, 800);
        } else {
          submitBtn.textContent = "Log In"; submitBtn.disabled = false;
          const card = document.querySelector('.auth-card'); card.style.borderColor = 'var(--accent-red)'; setTimeout(() => card.style.borderColor = 'var(--grid-border)', 1200);
          alert("Access Denied: " + (data.detail || "Invalid credentials."));
        }
      } catch (error) { submitBtn.textContent = "Log In"; submitBtn.disabled = false; alert("Cannot reach the server."); }
    });

    forgotBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      const emailValue = emailInput.value.trim();
      if (!emailValue) { forgotHint.classList.add('visible'); emailInput.focus(); setTimeout(() => forgotHint.classList.remove('visible'), 3000); return; }
      const original = submitBtn.textContent; submitBtn.textContent = "Sending Email..."; submitBtn.disabled = true;
      try {
        const response = await fetch('https://alfaaz-project.onrender.com/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: emailValue }) });
        const data = await response.json();
        if (response.ok) alert(data.message); else alert("Request failed: " + (data.detail || "Unknown error."));
      } catch (error) { alert("Cannot reach the server."); } finally { submitBtn.textContent = original; submitBtn.disabled = false; }
    });
  </script>
</body>
</html>
