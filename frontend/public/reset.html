<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ALFAAZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="global.css">
  <style>
    .auth-card { width: 100%; max-width: 420px; padding: 4rem 3rem; margin: 8rem auto; position: relative; }
    .auth-title { font-family: var(--font-heading); font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; font-weight: 400; }
    .auth-subtitle { font-family: var(--font-body); font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; text-align: center; margin-bottom: 3rem; text-transform: uppercase; }
    .input-group { margin-bottom: 2rem; }
    .auth-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--grid-border); color: var(--text-primary); font-family: var(--font-body); font-size: 14px; padding: 0.5rem 0; transition: border-color 0.3s ease; }
    .auth-input:focus { outline: none; border-bottom-color: var(--accent-gold); }
    .password-wrap { position: relative; }
    .password-wrap .auth-input { padding-right: 3rem; }
    .toggle-pw { position: absolute; right: 0; bottom: 0.5rem; background: none; border: none; color: var(--text-secondary); font-family: var(--font-body); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 0; transition: color 0.3s ease; }
    .toggle-pw:hover { color: var(--accent-gold); }
    .strength-bar-wrap { margin-top: 8px; height: 2px; background: var(--grid-border); }
    .strength-bar { height: 100%; width: 0%; transition: width 0.4s ease, background 0.4s ease; }
    .strength-label, .match-indicator { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; min-height: 12px; }
    #expiredOverlay { display: none; position: absolute; inset: 0; background: var(--bg-primary); z-index: 10; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 2rem; }
    #expiredOverlay.show { display: flex; }
  </style>
</head>
<body>
  <div class="custom-cursor" id="cursor"></div>

  <div class="auth-card panel">
    <div id="expiredOverlay">
      <div style="font-size: 2rem; margin-bottom: 1rem; color: var(--accent-red);">⊘</div>
      <p style="font-family:var(--font-heading); font-size: 2rem; color: var(--text-primary); margin-bottom: 0.5rem;">Link Expired</p>
      <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 2rem;">This reset link is no longer valid.<br>Please request a new one.</p>
      <a href="login.html" class="action-btn">Return to Login</a>
    </div>

    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Create a new secure password</p>

    <form id="resetForm">
      <div class="input-group">
        <label class="input-label" for="newPassword">New Password</label>
        <div class="password-wrap">
          <input type="password" id="newPassword" class="auth-input" required autocomplete="new-password">
          <button type="button" class="toggle-pw" id="toggleNew" tabindex="-1">show</button>
        </div>
        <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="input-group">
        <label class="input-label" for="confirmPassword">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword" class="auth-input" required autocomplete="new-password">
          <button type="button" class="toggle-pw" id="toggleConfirm" tabindex="-1">show</button>
        </div>
        <div class="match-indicator" id="matchIndicator"></div>
      </div>
      <button type="submit" class="submit-btn" style="width:100%;">Update Password</button>
    </form>
  </div>

  <script src="global.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search), token = urlParams.get('token');
    function isTokenLikelyExpired(t) { try { const payload = JSON.parse(atob(t.split('.')[1])); return payload.exp && (payload.exp * 1000 < Date.now()); } catch { return false; } }
    if (!token || isTokenLikelyExpired(token)) document.getElementById('expiredOverlay').classList.add('show');

    const form = document.getElementById('resetForm'), submitBtn = document.querySelector('.submit-btn'), newPwInput = document.getElementById('newPassword'), confirmInput = document.getElementById('confirmPassword'), strengthBar = document.getElementById('strengthBar'), strengthLabel = document.getElementById('strengthLabel'), matchIndicator = document.getElementById('matchIndicator');

    document.getElementById('toggleNew').addEventListener('click', () => { const hidden = newPwInput.type === 'password'; newPwInput.type = hidden ? 'text' : 'password'; document.getElementById('toggleNew').textContent = hidden ? 'hide' : 'show'; });
    document.getElementById('toggleConfirm').addEventListener('click', () => { const hidden = confirmInput.type === 'password'; confirmInput.type = hidden ? 'text' : 'password'; document.getElementById('toggleConfirm').textContent = hidden ? 'hide' : 'show'; });

    function getStrength(pw) { let s = 0; if (pw.length >= 8) s++; if (pw.length >= 12) s++; if (/[A-Z]/.test(pw)) s++; if (/[0-9]/.test(pw)) s++; if (/[^A-Za-z0-9]/.test(pw)) s++; return s; }
    const levels = [ { label: '', color: 'transparent', pct: '0%' }, { label: 'WEAK', color: 'var(--accent-red)', pct: '20%' }, { label: 'WEAK', color: 'var(--accent-red)', pct: '35%' }, { label: 'MODERATE', color: 'var(--accent-gold)', pct: '60%' }, { label: 'STRONG', color: 'var(--accent-green)', pct: '80%' }, { label: 'SECURE', color: 'var(--accent-green)', pct: '100%' } ];
    
    newPwInput.addEventListener('input', () => { const pw = newPwInput.value; const score = pw.length === 0 ? 0 : Math.max(1, getStrength(pw)); const lv = levels[score]; strengthBar.style.width = lv.pct; strengthBar.style.background = lv.color; strengthLabel.textContent = lv.label; strengthLabel.style.color = lv.color; checkMatch(); });
    function checkMatch() { const cf = confirmInput.value; if (!cf) { matchIndicator.textContent = ''; return; } if (newPwInput.value === cf) { matchIndicator.textContent = '✓ Passwords Match'; matchIndicator.style.color = 'var(--accent-green)'; } else { matchIndicator.textContent = '✗ Mismatch Detected'; matchIndicator.style.color = 'var(--accent-red)'; } }
    confirmInput.addEventListener('input', checkMatch);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = newPwInput.value, confirmPassword = confirmInput.value;
      if (newPassword.length < 8) { matchIndicator.textContent = '✗ Password must be at least 8 characters.'; matchIndicator.style.color = 'var(--accent-red)'; return; }
      if (newPassword !== confirmPassword) { matchIndicator.textContent = '✗ Passwords must match.'; matchIndicator.style.color = 'var(--accent-red)'; confirmInput.focus(); return; }

      submitBtn.textContent = "Updating..."; submitBtn.disabled = true;
      try {
        const response = await fetch('https://alfaaz-project.onrender.com/auth/reset-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: token, new_password: newPassword }) });
        const data = await response.json();
        if (response.ok) { submitBtn.textContent = "Success"; submitBtn.style.background = "var(--accent-gold)"; submitBtn.style.borderColor = "var(--accent-gold)"; submitBtn.style.color = "#fff"; setTimeout(() => { window.location.href = 'login.html'; }, 1500); } 
        else if (response.status === 401) { document.getElementById('expiredOverlay').classList.add('show'); } 
        else { submitBtn.textContent = "Update Password"; submitBtn.disabled = false; alert("Error: " + (data.detail || "Unknown error.")); }
      } catch (error) { submitBtn.textContent = "Update Password"; submitBtn.disabled = false; alert("Cannot reach the server."); }
    });
  </script>
</body>
</html>
