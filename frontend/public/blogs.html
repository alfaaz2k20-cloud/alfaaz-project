<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curated Archives | Alfaaz Collective</title>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <link rel="stylesheet" href="global.css">
  <style>
    main { max-width: 900px; margin: 8rem auto 4rem; padding: 0 2rem; min-height: 60vh; }
    .page-title { font-family: var(--font-heading); font-size: clamp(3rem, 6vw, 4.5rem); font-weight: 400; text-transform: uppercase; letter-spacing: 1px; color: var(--text-primary); margin-bottom: 0.5rem; line-height: 1; }
    .page-subtitle { font-family: var(--font-body); font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4rem; display: block; border-bottom: 1px solid var(--grid-border); padding-bottom: 2rem; }
    .archive-grid { display: flex; flex-direction: column; gap: 1.5rem; }
    .archive-card { background: var(--bg-secondary); padding: 3rem; position: relative; transition: box-shadow 0.4s var(--transition-smooth), transform 0.4s var(--transition-smooth); border: 1px solid var(--grid-border); text-decoration: none; display: block; cursor: none; box-shadow: var(--shadow-base); }
    .archive-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-float); border-color: rgba(189, 111, 93, 0.3); }
    .archive-meta { font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 1rem; display: block; }
    .archive-title { font-family: var(--font-heading); font-size: 2.2rem; font-weight: 400; color: var(--text-primary); line-height: 1.2; margin-bottom: 1rem; }
    .archive-excerpt { font-family: var(--font-body); font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
    .loading-state { font-size: 11px; color: var(--text-secondary); text-align: center; padding: 4rem; text-transform: uppercase; letter-spacing: 2px; border: 1px dashed var(--grid-border); }
    footer { text-align: center; padding: 3em 0; border-top: 1px solid var(--grid-border); font-size: 10px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }

    .nav-links { display: flex; align-items: center; gap: 2.5rem; }
    .nav-links a { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); text-decoration: none; position: relative; padding: 0.5rem 0; transition: color 0.3s ease; }
    .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: var(--accent-gold); transition: width 0.4s ease; }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a:hover { color: var(--accent-gold); }
    .nav-actions { display: flex; align-items: center; gap: 1.5rem; }
    .mobile-only-link { display: none; }
    #menuToggle { display: none; cursor: none; color: var(--text-primary); background: none; border: none; z-index: 1001; }
    #menuToggle .hamburger-close { display: none; }
    #menuToggle.active .hamburger-open { display: none; }
    #menuToggle.active .hamburger-close { display: block; }
    @media (max-width: 768px) { nav { padding: 1rem 1.5rem; } .nav-login { display: none !important; } .mobile-only-link { display: block; } .nav-links { display: none; position: absolute; top: 100%; left: 0; width: 100%; flex-direction: column; background: var(--bg-secondary); padding: 2rem; gap: 1.5rem; border-bottom: 1px solid var(--grid-border); box-shadow: 0 10px 20px rgba(0,0,0,0.05); } .nav-links.active { display: flex; } #menuToggle { display: flex; align-items: center; justify-content: center; margin-left: 0.5rem; } }
  </style>
</head>
<body>
    <nav id="navbar">
    <a href="index.html" class="logo magnetic">ALFAAZ</a>
    <div class="nav-links" id="navLinks">
      <a href="index.html#home" class="magnetic">Home</a>
      <a href="index.html#updates" class="magnetic">Updates</a>
      <a href="index.html#about" class="magnetic">About</a>
      <a href="index.html#journey" class="magnetic">Margins</a>
      <a href="index.html#clubs" class="magnetic">Clubs</a>
      <a href="blogs.html" class="magnetic" style="color:var(--accent-gold);">Journal</a>
      <a id="mobileLoginBtn" href="login.html" class="mobile-only-link magnetic">Login / Register</a>
    </div>
    <div class="nav-actions">
      <a id="navLoginBtn" href="login.html" class="nav-login magnetic" style="font-family: var(--font-body); font-size:11px; text-decoration:none; text-transform:uppercase; letter-spacing:2px; color:var(--text-primary); transition: color 0.3s;">Login / Register</a>
      <a id="tchLinkNav" href="https://tchandervar.neocities.org" target="_blank" rel="noopener noreferrer" class="cta-btn magnetic" style="padding: 0.6rem 1.2rem; font-size: 10px;">Tchandervar</a>
      <button id="menuToggle" aria-label="Toggle menu" aria-expanded="false"><i data-lucide="menu" class="w-6 h-6 hamburger-open"></i><i data-lucide="x" class="w-6 h-6 hamburger-close"></i></button>
    </div>
  </nav>

  <main>
    <h1 class="page-title">Curated Archives</h1>
    <span class="page-subtitle">Journal & Essays</span>
    <div id="blogContainer" class="archive-grid"><div class="loading-state">Opening archives...</div></div>
  </main>

  <footer><p>Alfaaz Collective // The Curator</p></footer>

  <script src="global.js"></script>
  <script>
    const menuToggle = document.getElementById('menuToggle'), navLinks = document.getElementById('navLinks');
    menuToggle?.addEventListener('click', () => { const isExpanded = menuToggle.getAttribute('aria-expanded') === 'true'; menuToggle.setAttribute('aria-expanded', !isExpanded); menuToggle.classList.toggle('active'); navLinks.classList.toggle('active'); });

    async function loadBlogs() {
      const container = document.getElementById('blogContainer');
      try {
        const res = await fetch('/api/blogs'); if (!res.ok) throw new Error();
        const blogs = await res.json();
        if (!blogs.length) { container.innerHTML = '<div class="loading-state">The archives are currently empty.</div>'; return; }
        container.innerHTML = blogs.map(blog => `
          <a href="post.html?id=${blog.id}" class="archive-card magnetic">
            <span class="archive-meta">${new Date(blog.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })} // Curator's Notes</span>
            <h2 class="archive-title">${blog.title}</h2>
            <p class="archive-excerpt">${blog.excerpt}</p>
          </a>`).join('');
        if(window.refreshGlobalEffects) window.refreshGlobalEffects();
      } catch (error) { container.innerHTML = '<div class="loading-state" style="color: var(--accent-red);">[Error] Archives unavailable.</div>'; }
    }
    document.addEventListener('DOMContentLoaded', loadBlogs);

// SMART ROUTING (Sync logged-in state across sub-pages)
    (function() {
      const isLoggedIn = !!localStorage.getItem('alfaaz_token') && !!localStorage.getItem('alfaaz_user');
      const navLoginBtn = document.getElementById('navLoginBtn'), mobileLoginLink = document.getElementById('mobileLoginBtn');
      if (isLoggedIn) {
        if (navLoginBtn) { navLoginBtn.textContent = 'Dashboard'; navLoginBtn.href = 'dashboard.html'; }
        if (mobileLoginLink) {
          // Both sub-pages are currently missing the ur-hover spans, but this protects it if you add them later
          const enSpan = mobileLoginLink.querySelector('.en-text');
          if (enSpan) enSpan.textContent = 'Dashboard';
          else mobileLoginLink.textContent = 'Dashboard';
          mobileLoginLink.href = 'dashboard.html';
        }
      }
    })();

  </script>
</body>
</html>
