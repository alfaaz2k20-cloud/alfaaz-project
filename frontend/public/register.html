<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ALFAAZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="global.css">
  <style>
    .auth-card { width: 100%; max-width: 420px; padding: 4rem 3rem; margin: 8rem auto; position: relative; }
    .auth-title { font-family: var(--font-heading); font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; font-weight: 400; }
    .auth-subtitle { font-family: var(--font-body); font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; text-align: center; margin-bottom: 3rem; text-transform: uppercase; }
    .input-group { margin-bottom: 2rem; }
    .auth-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--grid-border); color: var(--text-primary); font-family: var(--font-body); font-size: 14px; padding: 0.5rem 0; transition: border-color 0.3s ease; }
    .auth-input:focus { outline: none; border-bottom-color: var(--accent-gold); }
    .password-wrap { position: relative; }
    .password-wrap .auth-input { padding-right: 3rem; }
    .strength-bar-wrap { margin-top: 8px; height: 2px; background: var(--grid-border); }
    .strength-bar { height: 100%; width: 0%; transition: width 0.4s ease, background 0.4s ease; }
    .strength-label, .match-indicator { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; min-height: 12px; }
    .toggle-auth { margin-top: 2rem; text-align: center; font-size: 11px; color: var(--text-secondary); }
    .toggle-auth a { color: var(--accent-gold); text-decoration: none; transition: color 0.3s ease; }
    .toggle-auth a:hover { color: var(--accent-green); }
    .back-btn { position: fixed; top: 2rem; left: 2rem; color: var(--text-secondary); text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem; transition: color 0.3s ease; z-index: 100; }
    .back-btn:hover { color: var(--accent-gold); }
  </style>
</head>
<body>
  <div class="custom-cursor" id="cursor"></div>
  <a href="index.html" class="back-btn magnetic"><i data-lucide="arrow-left" class="w-4 h-4"></i> Return</a>

  <div class="auth-card panel">
    <h1 class="auth-title">Register</h1>
    <p class="auth-subtitle">Join the collective</p>
    <form id="registerForm">
      <div class="input-group">
        <label class="input-label" for="regName">Display Name <span style="color:var(--text-secondary); text-transform:lowercase;">(optional)</span></label>
        <input type="text" id="regName" class="auth-input" autocomplete="name" spellcheck="false" placeholder="e.g. Agha Shahid">
      </div>
      <div class="input-group">
        <label class="input-label" for="regEmail">Email Address</label>
        <input type="email" id="regEmail" class="auth-input" required autocomplete="email" spellcheck="false">
      </div>
      <div class="input-group">
        <label class="input-label" for="regPassword">Create Password</label>
        <input type="password" id="regPassword" class="auth-input" required autocomplete="new-password">
        <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="input-group">
        <label class="input-label" for="regConfirm">Confirm Password</label>
        <input type="password" id="regConfirm" class="auth-input" required autocomplete="new-password">
        <div class="match-indicator" id="matchIndicator"></div>
      </div>
      <button type="submit" class="submit-btn" style="width:100%;">Create Account</button>
    </form>
    <div class="toggle-auth">Already in the collective? <a href="login.html">Log In</a></div>
  </div>

  <script src="global.js"></script>
  <script>
    const form = document.getElementById('registerForm'), submitBtn = document.querySelector('.submit-btn'), passwordInput = document.getElementById('regPassword'), confirmInput = document.getElementById('regConfirm'), strengthBar = document.getElementById('strengthBar'), strengthLabel = document.getElementById('strengthLabel'), matchIndicator = document.getElementById('matchIndicator');

    function getStrength(pw) { let score = 0; if (pw.length >= 8) score++; if (pw.length >= 12) score++; if (/[A-Z]/.test(pw)) score++; if (/[0-9]/.test(pw)) score++; if (/[^A-Za-z0-9]/.test(pw)) score++; return score; }
    const strengthLevels = [ { label: '', color: 'transparent', pct: '0%' }, { label: 'WEAK', color: 'var(--accent-red)', pct: '20%' }, { label: 'WEAK', color: 'var(--accent-red)', pct: '35%' }, { label: 'MODERATE', color: 'var(--accent-gold)', pct: '60%' }, { label: 'STRONG', color: 'var(--accent-green)', pct: '80%' }, { label: 'SECURE', color: 'var(--accent-green)', pct: '100%' } ];

    passwordInput.addEventListener('input', () => { const pw = passwordInput.value; const score = pw.length === 0 ? 0 : Math.max(1, getStrength(pw)); const level = strengthLevels[score]; strengthBar.style.width = level.pct; strengthBar.style.background = level.color; strengthLabel.textContent = level.label; strengthLabel.style.color = level.color; checkMatch(); });
    function checkMatch() { const pw = passwordInput.value, cf = confirmInput.value; if (!cf) { matchIndicator.textContent = ''; return; } if (pw === cf) { matchIndicator.textContent = '✓ Passwords Match'; matchIndicator.style.color = 'var(--accent-green)'; } else { matchIndicator.textContent = '✗ Mismatch Detected'; matchIndicator.style.color = 'var(--accent-red)'; } }
    confirmInput.addEventListener('input', checkMatch);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const emailValue = document.getElementById('regEmail').value.trim(), nameValue = document.getElementById('regName').value.trim(), passwordValue = passwordInput.value, confirmValue = confirmInput.value;
      if (passwordValue.length < 8) { matchIndicator.textContent = '✗ Password must be at least 8 characters.'; matchIndicator.style.color = 'var(--accent-red)'; return; }
      if (passwordValue !== confirmValue) { matchIndicator.textContent = '✗ Passwords must match before proceeding.'; matchIndicator.style.color = 'var(--accent-red)'; confirmInput.focus(); return; }
      
      submitBtn.textContent = "Processing..."; submitBtn.disabled = true;
      try {
        const response = await fetch('https://alfaaz-project.onrender.com/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: emailValue, password: passwordValue, full_name: nameValue || null }) });
        const data = await response.json();
        if (response.ok) {
          submitBtn.textContent = "Account Created"; submitBtn.style.background = "var(--accent-gold)"; submitBtn.style.color = "#fff"; submitBtn.style.borderColor = "var(--accent-gold)";
          localStorage.setItem('alfaaz_user', JSON.stringify(data.user)); localStorage.setItem('alfaaz_token', data.token);
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        } else {
          submitBtn.textContent = "Create Account"; submitBtn.disabled = false;
          alert("Registration Failed: " + (data.detail?.[0]?.msg || data.detail || "Registration failed."));
        }
      } catch (error) { submitBtn.textContent = "Create Account"; submitBtn.disabled = false; alert("Cannot reach the server."); }
    });
  </script>
</body>
</html>
