<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d2722">
  <title>Offline - Alfaaz Collective</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f0e7;
      --ink: #2d2722;
      --muted: #6f6257;
      --accent: #bd6f5d;
      --line: rgba(45, 39, 34, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }
    main {
      width: min(100%, 620px);
      border: 1px solid var(--line);
      padding: clamp(2rem, 8vw, 4rem);
      text-align: center;
      background: rgba(255, 255, 255, 0.32);
    }
    .eyebrow {
      margin: 0 0 1rem;
      color: var(--accent);
      font: 700 0.72rem Arial, sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 400;
      line-height: 0.96;
      text-transform: uppercase;
    }
    p {
      margin: 1.5rem auto 0;
      max-width: 32rem;
      color: var(--muted);
      font: 0.95rem/1.8 Arial, sans-serif;
    }
    a {
      display: inline-block;
      margin-top: 2rem;
      border: 1px solid var(--ink);
      padding: 0.8rem 1.2rem;
      color: var(--ink);
      font: 700 0.68rem Arial, sans-serif;
      letter-spacing: 0.16em;
      text-decoration: none;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Offline Archive</p>
    <h1>Alfaaz<br>Collective</h1>
    <p>You are offline. Previously visited pages may still be available, and live notices or dashboard actions will reconnect when the network returns.</p>
    <a href="/">Return Home</a>
  </main>
</body>
</html>
