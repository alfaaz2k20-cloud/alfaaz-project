<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="global.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#2d2722">
  <meta name="application-name" content="Alfaaz">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Alfaaz">
  <link rel="apple-touch-icon" href="/images/icons/icon-192.png">
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
  <title>Login — ALFAAZ Collective</title>
  <script src="https://cdn.tailwindcss.com" defer></script>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <link rel="stylesheet" href="global.css">
  
  
  <script type="module" src="src/login.js"></script>
  <style>
    .auth-card { width: 100%; max-width: 420px; padding: 4rem 3rem; margin: 8rem auto; position: relative; }
    .auth-title { font-family: var(--font-heading); font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; font-weight: 400; }
    .auth-subtitle { font-family: var(--font-body); font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; text-align: center; margin-bottom: 3rem; text-transform: uppercase; }
    .input-group { margin-bottom: 2rem; }
    .auth-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--grid-border); color: var(--text-primary); font-family: var(--font-body); font-size: 14px; padding: 0.5rem 0; transition: border-color 0.3s ease; }
    .auth-input:focus { outline: none; border-bottom-color: var(--accent-gold); }
    .password-wrap { position: relative; }
    .password-wrap .auth-input { padding-right: 3rem; }
    .toggle-pw { position: absolute; right: 0; bottom: 0.5rem; background: none; border: none; color: var(--text-secondary); font-family: var(--font-body); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 0; transition: color 0.3s ease; }
    .toggle-pw:hover { color: var(--accent-gold); }
    .forgot-hint { font-size: 10px; color: var(--text-secondary); margin-top: 6px; opacity: 0; transform: translateY(-4px); transition: opacity 0.3s ease, transform 0.3s ease; }
    .forgot-hint.visible { opacity: 1; transform: translateY(0); }
    .recovery-link { display: block; text-align: right; font-size: 10px; color: var(--text-secondary); text-decoration: none; margin-top: 0.5rem; margin-bottom: 2rem; transition: color 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
    .recovery-link:hover { color: var(--accent-gold); }
    .toggle-auth { margin-top: 2rem; text-align: center; font-size: 11px; color: var(--text-secondary); }
    .toggle-auth a { color: var(--accent-gold); text-decoration: none; transition: color 0.3s ease; }
    .toggle-auth a:hover { color: var(--accent-green); }
  </style>
</head>
<body>
  
    <nav id="navbar" style="justify-content: space-between;">
    <a href="index.html" class="logo">ALFAAZ</a>
    <div class="nav-actions">
      <a href="index.html" class="" style="font-size: 11px; color: var(--text-secondary); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s ease;">Return</a>
    </div>
  </nav>

  <div class="auth-card panel">
    <h1 class="auth-title">Login</h1>
    <p class="auth-subtitle">Access your account</p>
    <form id="authForm">
      <div class="input-group">
        <label class="input-label" for="email">Email Address</label>
        <input type="email" id="email" class="auth-input" required autocomplete="email" spellcheck="false">
      </div>
      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" class="auth-input" required autocomplete="current-password">
          <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">show</button>
        </div>
      </div>
      <a href="#" id="forgotBtn" class="recovery-link">Lost Password?</a>
      <div class="forgot-hint" id="forgotHint">↑ Enter your email above, then click "Lost Password?"</div>
      <button type="submit" class="submit-btn" style="width: 100%;">Log In</button>
    </form>
    <div class="toggle-auth">New to the collective? <a href="register.html">Register here</a></div>
  </div>

</body>
</html>
